# Nginx reverse proxy for Billing API on VPS
# 1. Copy to /etc/nginx/sites-available/billing-api
# 2. Replace YOUR_API_DOMAIN
# 3. ln -s /etc/nginx/sites-available/billing-api /etc/nginx/sites-enabled/
# 4. certbot --nginx -d YOUR_API_DOMAIN
# 5. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name YOUR_API_DOMAIN;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
