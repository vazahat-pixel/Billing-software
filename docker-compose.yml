# Textile ERP — local / staging stack
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles: ["redis"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/billing_software
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-production-secret-32+}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      REDIS_URL: ${REDIS_URL:-}
      BACKUP_DIR: /app/backups
      RATE_LIMIT_MAX: 2000
    volumes:
      - api_backups:/app/backups
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  api_backups:
